name: pr

# Fast, cheap verification on every PR and on pushes to main. iOS/release builds
# are gated to the tag pipeline (release.yml) so PRs never burn macOS minutes.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin the SAME Flutter version as .fvmrc.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Resolve workspace
        run: flutter pub get

      # Codegen FIRST — a tree of gitignored, un-generated part files otherwise
      # produces confusing "missing part file" / undefined-class errors.
      - name: Codegen (gen-l10n + build_runner)
        run: |
          (cd packages/l10n && flutter gen-l10n)
          (cd packages/data && dart run build_runner build --delete-conflicting-outputs)
          (cd apps/car_and_pain && dart run build_runner build --delete-conflicting-outputs)

      - name: Format check (blocking)
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze (blocking, --fatal-infos)
        run: flutter analyze --fatal-infos

      - name: custom_lint / riverpod_lint (blocking)
        run: cd apps/car_and_pain && dart run custom_lint

      - name: Tests with coverage
        run: |
          for pkg in packages/core packages/data packages/notifications \
                     packages/design_system apps/car_and_pain; do
            echo "== testing $pkg =="
            (cd "$pkg" && flutter test --coverage)
          done

      # Local coverage is 95-99%; the CI (Linux) number runs a few points lower
      # because const-constructor hits are attributed differently per platform,
      # so the gate carries margin. It still catches a real coverage regression.
      - name: Coverage gate (core logic package)
        run: bash tool/check_coverage.sh packages/core/coverage/lcov.info 85

      # ── The three blocking product-promise gates ────────────────────────
      - name: No-telemetry lockfile scan
        run: dart run tool/scan_no_telemetry.dart

      - name: No INTERNET in release manifest
        run: bash tool/check_no_internet_permission.sh

      - name: Directional-geometry grep
        run: bash tool/check_directional_geometry.sh

      # The DB-header (not `SQLite format 3`) encryption test lives in the data
      # package; it skips on hosts without SQLCipher and runs on a device lane.
      #
      # Native APK/AAB + iOS builds run on the release pipeline (release.yml) so
      # the PR lane stays fast and deterministic — `flutter test` already
      # compiles the whole app (Dart) on every PR.

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: "**/coverage/lcov.info"
          if-no-files-found: ignore
