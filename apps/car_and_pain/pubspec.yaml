name: car_and_pain
description: >-
  Car and Pain — the thin runnable app shell. Two flavor entrypoints
  (main_dev/main_prod) → shared bootstrap composition root, the single GoRouter,
  and ~25 feature folders. Offline-first, account-free, no telemetry.
publish_to: none
# x.y.z+BUILD — the build number is injected from CI (never hand-bumped).
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.24.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Workspace packages (the frozen foundations) ──────────────────────────
  core:
    path: ../../packages/core
  data:
    path: ../../packages/data
  notifications:
    path: ../../packages/notifications
  l10n:
    path: ../../packages/l10n
  design_system:
    path: ../../packages/design_system
  security:
    path: ../../packages/security

  # ── The ONE framework dependency: Riverpod (DI + state) ──────────────────
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # ── First-party / kept runtime deps ──────────────────────────────────────
  go_router: ^14.0.0 # first-party router (invariant: go_router only)
  path_provider: ^2.1.0 # first-party; resolves app-private directories

  # ── OS notifications (F5): sanctioned native deps per the invariant-#11
  # platform-work exception. NOT analytics/telemetry; no INTERNET needed.
  # Majors are verified-current at kickoff; live delivery/reboot need on-device
  # QA (TODO(F5): record the verified version + OS once tested on a device).
  flutter_local_notifications: ^19.0.0 # zonedSchedule + channels
  timezone: ^0.10.0 # tz database for zoned firing
  flutter_timezone: ^4.0.0 # resolve the device zone
  permission_handler: ^12.0.0 # POST_NOTIFICATIONS / SCHEDULE_EXACT_ALARM

  # ── Security & app-lock (F7): sanctioned native deps per invariant-#11.
  # security-critical native work (keystore, biometrics, native KDF). NOT
  # telemetry; no INTERNET. On-device QA flagged where hardware is required.
  flutter_secure_storage: ^9.2.0 # Keychain / Android Keystore for envelopes
  local_auth: ^2.3.0 # biometric / device-credential unlock prompt
  # Native AES-GCM + Argon2id acceleration. The plugin auto-registers its
  # backend when present — no Dart call is needed (enable() is deprecated) — so
  # there is deliberately no import; its value is the faster native KDF at unlock.
  cryptography_flutter: ^2.3.0

  # ── Attachment intake (F8): the sanctioned "small file/share access" set per
  # the dependency ADR. NOT telemetry; no INTERNET — nothing leaves the device.
  # Image compression is done zero-dep via dart:ui in an isolate (also strips
  # EXIF); PDF in-app render and video transcode are deferred (no ffmpeg).
  file_picker: ^8.1.0 # arbitrary file + PDF pick (manual fallback)
  image_picker: ^1.1.0 # camera capture + gallery pick (first-party, flutter.dev)
  share_plus: ^10.1.0 # OS share sheet (share-OUT, open-externally). TODO(F8): device QA

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^3.0.0
  custom_lint: ^0.8.0
  riverpod_lint: ^3.0.0

flutter:
  uses-material-design: true
