name: design_system
description: >-
  Car and Pain's PULSE design system: warm-paper/ink dual-theme tokens, the
  urgency/temperature ramp, RTL-aware Directional-only widgets, redundant
  (never-colour-alone) status encoding, and (later) Semantics-annotated
  CustomPainter charts and the accessible lock UI.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.6.0
  flutter: ">=3.24.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

# Bundled OFL script fonts (F4-T6). Two variable families cover all six locales:
# Hanken Grotesk for Latin (en/de/fr); Vazirmatn for the Arabic script
# (fa/ar/ckb) incl. Persian/Sorani letterforms and Eastern-Arabic/Persian
# digits. Declared here (design_system owns typography); referenced app-wide as
# `packages/design_system/<family>`. Licenses recorded in
# docs/reference/third-party-licenses.md and registered via registerFontLicenses().
flutter:
  fonts:
    - family: HankenGrotesk
      fonts:
        - asset: fonts/HankenGrotesk-VF.ttf
    - family: Vazirmatn
      fonts:
        - asset: fonts/Vazirmatn-VF.ttf
  # OFL texts bundled as assets so registerFontLicenses() can surface them on
  # the app's licenses page (read lazily, never embedded in Dart source).
  assets:
    - fonts/HankenGrotesk-OFL.txt
    - fonts/Vazirmatn-OFL.txt
